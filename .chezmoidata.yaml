  # Text Editors
  nvim:
    windows:
      scoop: [neovim]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [neovim]
    darwin:
      brew: []
      mise: [neovim]

  vim:
    windows:
      scoop: [vim]
      winget: []
      mise: []
    linux:
      apt: []
