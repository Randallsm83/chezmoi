# Chezmoi data file
# https://www.chezmoi.io/user-guide/manage-machine-to-machine-differences/
# Version: 2.0.0
#
# This file contains:
# - Package lists for automated installation
# - Theme colors and font configurations
# - Package feature flags (which optional configs to deploy)
#
# NOTE: User info, platform detection, and machine type are in .chezmoi.toml.tmpl
# NOTE: Use .chezmoi.local.toml for machine-specific overrides


# ============================================================================
# Theme Colors
# ============================================================================
# Referenced in: neovim, starship, wezterm, eza/vivid configs
# Override active theme in .chezmoi.local.toml: [data] theme = "onedark"
# Available themes: spaceduck, onedark, gruvbox-material, tokyonight, tokyonight-storm, dracula, kanagawa

theme:
  name: "spaceduck"  # Active theme

  # Spaceduck - Visual colors from pineapplegiant/spaceduck extended palette
  # NOTE: The official spaceduck ANSI slots are non-standard (magenta=#f2ce00,
  # cyan=#7a5ccc, yellow=#b3a1e6). We use VISUAL color names here to match
  # every other theme, since the bat/delta generator maps semantically:
  #   purple → keywords, yellow → classes, cyan → comments (with alpha)
  spaceduck:
    background: "#0f111b"
    foreground: "#ecf0c1"
    purple: "#e39400"       # Keywords — warm orange (avoids harsh #f2ce00 yellow)
    pink: "#ce6f8f"         # Constants — spaceduck pink/rose
    green: "#5ccc96"        # Strings — spaceduck green
    orange: "#e33400"       # Numbers — spaceduck red
    blue: "#00a3cc"         # Functions — spaceduck blue
    cyan: "#42b3c2"         # Comments (50% alpha) — spaceduck teal
    yellow: "#42b3c2"       # Classes/types — spaceduck teal

  # OneDark - navarasu/onedark.nvim
  onedark:
    background: "#282c34"
    foreground: "#abb2bf"
    purple: "#c678dd"
    pink: "#e06c75"
    green: "#98c379"
    orange: "#d19965"
    blue: "#61afef"
    cyan: "#56b6c2"
    yellow: "#e5c07b"

  # Gruvbox Material - sainnhe/gruvbox-material
  gruvbox-material:
    background: "#1d2021"
    foreground: "#d4be98"
    purple: "#d3869b"
    pink: "#ea6962"
    green: "#a9b665"
    orange: "#e78a4e"
    blue: "#7daea3"
    cyan: "#89b482"
    yellow: "#d8a657"

  # Tokyo Night - folke/tokyonight.nvim (night variant)
  tokyonight:
    background: "#1a1b26"
    foreground: "#c0caf5"
    purple: "#bb9af7"
    pink: "#f7768e"
    green: "#9ece6a"
    orange: "#ff9e64"
    blue: "#7aa2f7"
    cyan: "#7dcfff"
    yellow: "#e0af68"

  # Tokyo Night Storm - folke/tokyonight.nvim (storm variant)
  tokyonight-storm:
    background: "#24283b"
    foreground: "#c0caf5"
    purple: "#bb9af7"
    pink: "#f7768e"
    green: "#9ece6a"
    orange: "#ff9e64"
    blue: "#7aa2f7"
    cyan: "#7dcfff"
    yellow: "#e0af68"

  # Dracula - Official spec from draculatheme.com/spec
  dracula:
    background: "#282a36"
    foreground: "#f8f8f2"
    purple: "#bd93f9"
    pink: "#ff79c6"
    green: "#50fa7b"
    orange: "#ffb86c"
    blue: "#8be9fd"       # cyan in official spec
    cyan: "#8be9fd"
    yellow: "#f1fa8c"

  # Kanagawa - rebelot/kanagawa.nvim (wave variant)
  kanagawa:
    background: "#1f1f28"  # sumiInk3
    foreground: "#dcd7ba"  # fujiWhite
    purple: "#957fb8"      # oniViolet
    pink: "#d27e99"        # sakuraPink
    green: "#98bb6c"       # springGreen
    orange: "#ffa066"      # surimiOrange
    blue: "#7e9cd8"        # crystalBlue
    cyan: "#7fb4ca"        # springBlue
    yellow: "#e6c384"      # carpYellow

# ============================================================================
# Theme Mappings
# ============================================================================
# Maps chezmoi theme names to application-specific theme identifiers

theme_mappings:
  # Neovim colorscheme plugin/command names
  neovim:
    spaceduck: "spaceduck"                   # pineapplegiant/spaceduck
    onedark: "onedark"                       # navarasu/onedark.nvim
    gruvbox-material: "gruvbox-material"     # sainnhe/gruvbox-material
    tokyonight: "tokyonight"                 # folke/tokyonight.nvim
    tokyonight-storm: "tokyonight-storm"     # folke/tokyonight.nvim
    dracula: "dracula"                       # dracula/vim
    kanagawa: "kanagawa"                     # rebelot/kanagawa.nvim

  # WezTerm colorscheme names
  # NOTE: "Spaceduck" is a custom scheme shipped in dot_config/wezterm/colors/Spaceduck.toml
  # (wezterm has no builtin Spaceduck scheme as of 20240203).
  wezterm:
    spaceduck: "Spaceduck"
    onedark: "OneDark (base16)"
    gruvbox-material: "Gruvbox Material (Gogh)"
    tokyonight: "Tokyo Night"
    tokyonight-storm: "Tokyo Night Storm"
    dracula: "Dracula (Official)"
    kanagawa: "Kanagawa (Gogh)"

  # Starship palette names (defined in starship.toml)
  starship:
    spaceduck: "spaceduck"
    onedark: "onedark"
    gruvbox-material: "gruvbox_dark_material"
    tokyonight: "tokyonight"
    tokyonight-storm: "tokyonight_storm"
    dracula: "dracula"
    kanagawa: "kanagawa"

  # Vivid theme names (for LS_COLORS generation)
  vivid:
    spaceduck: "spaceduck"
    onedark: "one-dark"
    gruvbox-material: "gruvbox-dark"
    tokyonight: "tokyonight-night"
    tokyonight-storm: "tokyonight-storm"
    dracula: "dracula"
    kanagawa: "molokai"  # fallback - vivid doesn't have kanagawa

  # Eza theme filenames (in ~/.config/eza/themes/)
  eza:
    spaceduck: "spaceduck"
    onedark: "one-dark"
    gruvbox-material: "gruvbox-dark"
    tokyonight: "tokyonight-night"
    tokyonight-storm: "tokyonight-storm"
    dracula: "dracula"
    kanagawa: "kanagawa"  # TODO: create eza kanagawa theme

  # Bat (cat with syntax highlighting) and Delta (git diff)
  # Use custom .tmTheme files generated from our color palettes
  bat:
    spaceduck: "spaceduck"
    onedark: "onedark"
    gruvbox-material: "gruvbox-material"
    tokyonight: "tokyonight"
    tokyonight-storm: "tokyonight-storm"
    dracula: "dracula"
    kanagawa: "kanagawa"

  # Delta uses same theme names as bat
  delta:
    spaceduck: "spaceduck"
    onedark: "onedark"
    gruvbox-material: "gruvbox-material"
    tokyonight: "tokyonight"
    tokyonight-storm: "tokyonight-storm"
    dracula: "dracula"
    kanagawa: "kanagawa"

  # OpenCode TUI theme names (custom JSONs generated from our palette)
  opencode:
    spaceduck: "spaceduck"
    onedark: "onedark"
    gruvbox-material: "gruvbox-material"
    tokyonight: "tokyonight"
    tokyonight-storm: "tokyonight-storm"
    dracula: "dracula"
    kanagawa: "kanagawa"

  # Vim colorscheme names (vim-plug plugin names)
  vim:
    spaceduck: "spaceduck"           # pineapplegiant/spaceduck
    onedark: "onedark"               # joshdick/onedark.vim
    gruvbox-material: "gruvbox"      # morhetz/gruvbox (no gruvbox-material for vim)
    tokyonight: "tokyonight"         # ghifarit53/tokyonight-vim
    tokyonight-storm: "tokyonight"   # ghifarit53/tokyonight-vim
    dracula: "dracula"               # dracula/vim
    kanagawa: "kanagawa"             # rebelot/kanagawa.nvim (works in vim)

  # Vim airline theme names
  vim_airline:
    spaceduck: "spaceduck"           # comes with spaceduck plugin
    onedark: "onedark"               # comes with onedark plugin
    gruvbox-material: "gruvbox"      # comes with gruvbox plugin
    tokyonight: "tokyonight"         # comes with tokyonight plugin
    tokyonight-storm: "tokyonight"   # comes with tokyonight plugin
    dracula: "dracula"               # comes with dracula plugin
    kanagawa: "kanagawa"             # comes with kanagawa plugin

# ============================================================================
# Fonts
# ============================================================================
# Referenced in: wezterm, alacritty, Windows Terminal configs
# Override in .chezmoi.local.toml: [data] font = "JetBrainsMono"

fonts:
  primary: "Hack"
  fallback: "FiraCode"
  nerd_fonts:
    - "Hack Nerd Font"
    - "FiraCode Nerd Font"
    - "JetBrainsMono Nerd Font"
    - "CascadiaCode Nerd Font"
  emoji: "Noto Color Emoji"
  symbols: "Symbols Nerd Font Mono"

  # Fira Code ligature settings (OpenType features)
  fira_code_stylistic_sets:
    - ss02  # >= <= != == === !==
    - ss03  # ->
    - ss04  # >=
    - ss05  # @
    - ss08  # == === != !==
  fira_code_character_variants:
    - cv15  # &
    - cv24  # >=
    - cv29  # {}

# ============================================================================
# SSH and Authentication
# ============================================================================
# 1Password SSH agent configuration
# See SECRETS.md for setup instructions

ssh:
  agent: "1password"  # Use 1Password SSH agent
  windows_pipe: "\\\\.\\pipe\\openssh-ssh-agent"
  unix_socket: "~/.1password/agent.sock"
  # 1Password SSH agent vaults to expose (order = key offer order).
  # Rendered into agent.toml via .chezmoitemplates/1password-agent.toml
  # Override in .chezmoi.local.toml: [data.ssh] onepassword_vaults = ["Personal"]
  onepassword_vaults:
    - Personal
    - DH
    - Homelab

# ============================================================================
# Package Feature Flags
# ============================================================================
# Controls which configuration files are deployed by chezmoi
#
# Usage in templates:
#   {{- if index .package_features "rust" }}
#   # Deploy ~/.config/rust/* configs
#   {{- end }}
#
# Group flags (convenience shortcuts):
#   {{- if .package_features.essentials }}
#   # Enables: git, ssh, 1password, mise, direnv
#   {{- end }}
#
# Override in .chezmoi.local.toml:
#   [data.package_features]
#   rust = false
#   golang = false

package_features:
  # ============================================================================
  # Group Flags (convenience shortcuts)
  # ============================================================================
  essentials: true      # git, ssh, 1password, mise, direnv
  shell_tools: true     # starship, zsh, bat, eza, ripgrep, fd, fzf, zoxide, delta, vivid, wget, thefuck
  languages: true       # All language runtimes (node, python, ruby, go, rust, lua)
  editors: true         # nvim, vscode
  terminals: true       # wezterm, warp, windows_terminal

  # ============================================================================
  # Version Control & Authentication (sane defaults)
  # ============================================================================
  # NOTE: `1password` starts with a digit — not a valid Go template identifier.
  # Always access via `index .package_features "1password"`, never dot notation.
  git: true
  ssh: true
  1password: true

  # ============================================================================
  # Package & Tool Version Management (sane defaults)
  # ============================================================================
  mise: true            # Version manager (replaces asdf/nvm)
  direnv: true          # Per-directory environments
  homebrew: true        # Package manager (Linux/macOS)

  # ============================================================================
  # Terminal Emulators (recommended)
  # ============================================================================
  wezterm: true
  warp: true
  windows_terminal: true

  # ============================================================================
  # Text Editors (recommended)
  # ============================================================================
  nvim: true
  vim: true
  vscode: true
  zed: true

  # ============================================================================
  # Shell Tools (recommended)
  # ============================================================================
  starship: true        # Cross-platform prompt
  zsh: true             # Unix shells only
  powershell: true      # Windows shell
  fzf: true             # Fuzzy finder (Go, not Rust)
  wget: true            # Downloader
  thefuck: true         # Command correction (Python)
  fastfetch: true       # System info display (C++)
  topgrade: true        # Cross-platform system upgrader (Rust)
  rust_alternatives: true # All Rust CLI tools: bat, rg, fd, eza, delta, zoxide, vivid,
                          # uutils-coreutils, tealdeer, navi, sd, dust, procs, hyperfine,
                          # just, tokei, ouch, xh

  # ============================================================================
  # Language Runtimes (optional - enable as needed)
  # ============================================================================
  rust: true
  golang: true
  python: true
  ruby: true
  lua: true
  node: true
  perl: true
  julia: true
  php: false        # Requires many build deps (openssl, re2c, etc), enable manually if needed

  # ============================================================================
  # Development Tools (optional)
  # ============================================================================
  sqlite3: true
  arduino: true
  vagrant: false        # Virtualization

  # ============================================================================
  # Fonts
  # ============================================================================
  nerd_fonts: true       # Nerd Font families (scoop nerd-fonts bucket)

  # ============================================================================
  # AI & ML Tools
  # ============================================================================
  ai_tools: true         # LLM inference and AI coding assistants (ollama, claude-code, opencode)

  # ============================================================================
  # Gaming
  # ============================================================================
  gaming: true           # Gaming platforms, save backup, OSD/monitoring

  # ============================================================================
  # Container Tools
  # ============================================================================
  docker: true           # Container orchestration

  # ============================================================================
  # Hardware & Drivers (Windows-only)
  # ============================================================================
  hardware_tools: true   # Hardware diagnostics, GPU tools, driver management

  # ============================================================================
  # Windows System Utilities
  # ============================================================================
  windows_utilities: true  # Search, launcher, cleanup, bootable USB
  sysinternals: true       # Microsoft Sysinternals suite

  # ============================================================================
  # Networking
  # ============================================================================
  network_tools: true    # DNS, cloud storage sync, network diagnostics

  # ============================================================================
  # Miscellaneous Development
  # ============================================================================
  dev_extras: true       # Document conversion, .NET tools, API testing, WordPress

  # ============================================================================
  # Legacy/Deprecated (disabled)
  # ============================================================================
  asdf: false           # DEPRECATED: Replaced by mise
  nvm: false            # DEPRECATED: Replaced by mise
  tinted_theming: false # DEPRECATED: Replaced by unified theme system

# ============================================================================
# Package Mapping
# ============================================================================
# Maps feature flags to actual packages per platform/manager
# This allows feature flags to control BOTH config deployment AND package installation
#
# Package manager priority on Unix:
#   1. mise - If available via mise, use it
#   2. brew - Only for tools not in mise (zsh, thefuck) and GUI apps
#   3. System pkg manager - Only build-essential
#
# Bootstrap order on Unix:
#   1. Build from source (if needed): git, curl → ~/.local/share/
#   2. Install homebrew → ~/.local/share/homebrew (Linux) or /opt/homebrew (macOS)
#   3. brew installs base tools
#   4. mise installs CLI tools and language runtimes

# Package Mapping - Platform-based structure
# Each package specifies installation sources per platform.
#
# Windows: scoop (CLI), winget (GUI/system), mise (runtimes)
# Linux: apt/dnf/pacman (bootstrap only), brew, mise
# Darwin: brew, mise
#
# System package managers (apt/dnf/pacman) are ONLY for bootstrap essentials.
# After bootstrap, brew and mise handle everything - never overlap.

package_mapping:
  # Version Control & Authentication
  git:
    windows:
      scoop: [git, gh, glab, lazygit]
      winget: [Git.Git]
      mise: []
    linux:
      apt: [git]
      dnf: [git]
      pacman: [git]
      brew: [lazygit]
      mise: [github-cli]
    darwin:
      brew: [git, lazygit]
      mise: [github-cli]

  ssh:
    windows:
      scoop: []
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  1password:
    windows:
      scoop: [1password-cli]
      winget: [AgileBits.1Password]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []  # 1password-cli has no brew formula on Linux - use apt/install script
      mise: []
    darwin:
      brew: []
      cask: [1password-cli, 1password]  # Both are casks on macOS
      mise: []

  # Package & Tool Version Management
  mise:
    windows:
      scoop: [mise]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []  # mise installed via curl in bootstrap, not brew
      mise: []
    darwin:
      brew: [mise]
      mise: []

  direnv:
    windows:
      scoop: []
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [direnv]
    darwin:
      brew: []
      mise: [direnv]

  homebrew:
    windows:
      scoop: []
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  # Terminal Emulators (GUI apps - casks are macOS only)
  wezterm:
    windows:
      scoop: []
      winget: [wez.wezterm]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []  # wezterm is a cask (macOS only)
      mise: []
    darwin:
      brew: []
      cask: [wezterm]
      mise: []

  warp:
