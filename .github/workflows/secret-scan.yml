name: secret-scan

# Server-side backstop to the local gitleaks pre-commit hook. Uses the same
# .gitleaks.toml ruleset. GitHub-native secret scanning + push protection are
# also enabled on this repo (Settings → Code security); this catches anything
# that bypasses the local hook (e.g. `git commit --no-verify`).
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # weekly full-history sweep

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: .gitleaks.toml
