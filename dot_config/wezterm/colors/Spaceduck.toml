[metadata]
name = "Spaceduck"
author = "Pine (pineapplegiant) — palette normalized to standard ANSI semantics"
origin_url = "https://github.com/pineapplegiant/spaceduck-terminal"

# Standard ANSI semantics so tools that emit "yellow", "cyan", etc. render
# the expected hue. Matches starship's `[palettes.spaceduck]` and the
# `theme.spaceduck` palette in .chezmoidata.yaml. The pineapplegiant
# author maps yellow/magenta/cyan slots to off-hue colors; we deliberately
# do NOT do that here — see .chezmoidata.yaml notes.

[colors]
foreground = "#ecf0c1"
background = "#0f111b"

cursor_bg = "#f2ce00"
cursor_fg = "#0f111b"
cursor_border = "#f2ce00"

selection_bg = "#1e2340"
selection_fg = "#ecf0c1"

scrollbar_thumb = "#686f9a"
split          = "#b3a1e6"
visual_bell    = "#16192e"
compose_cursor = "#e39400"

ansi = [
  "#000000",  # 0  black
  "#e33400",  # 1  red       (spaceduck red)
  "#5ccc96",  # 2  green     (spaceduck green)
  "#f2ce00",  # 3  yellow    (spaceduck yellow — actual yellow, not purple)
  "#00a3cc",  # 4  blue      (spaceduck blue/teal)
  "#b3a1e6",  # 5  magenta   (spaceduck purple — closest to magenta)
  "#42b3c2",  # 6  cyan      (spaceduck teal)
  "#ecf0c1",  # 7  white     (spaceduck foreground)
]

brights = [
  "#686f9a",  # 8  bright black
  "#ff5733",  # 9  bright red
  "#6fe4a8",  # 10 bright green
  "#ffd942",  # 11 bright yellow
  "#2cc5e6",  # 12 bright blue
  "#ce6f8f",  # 13 bright magenta (spaceduck pink)
  "#56c3d4",  # 14 bright cyan
  "#f0f1ce",  # 15 bright white
]

[colors.tab_bar]
background = "#0f111b"

[colors.tab_bar.active_tab]
bg_color = "#b3a1e6"
fg_color = "#0f111b"
intensity = "Bold"

[colors.tab_bar.inactive_tab]
bg_color = "#16192e"
fg_color = "#ecf0c1"

[colors.tab_bar.inactive_tab_hover]
bg_color = "#1e2340"
fg_color = "#ecf0c1"
italic = true

[colors.tab_bar.new_tab]
bg_color = "#16192e"
fg_color = "#b3a1e6"

[colors.tab_bar.new_tab_hover]
bg_color = "#1e2340"
fg_color = "#f2ce00"
italic = true
