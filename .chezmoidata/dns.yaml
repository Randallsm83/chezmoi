# .chezmoidata/dns.yaml
# DNS routing (NRPT/resolver), DoT profile, browser DoH disable policies, Caddy CA trust.
# Loaded by chezmoi automatically as part of the .chezmoidata/ directory.
# ============================================================================
# DNS routing rules (NRPT / /etc/resolver / systemd-resolved)
# ============================================================================
# Per-namespace DNS routing. Each entry is a logical profile name; for every
# (profile, domain) pair the cross-platform install scripts ensure a routing
# rule exists sending queries for that domain to the profile's nameserver.
#
# Installers:
#   - Windows  -> NRPT rules (Add-DnsClientNrptRule)
#   - macOS    -> /etc/resolver/<domain> files
#   - Linux    -> systemd-resolved domain routing where available
#
# A `domains: [""]` entry is special-cased to the NRPT catch-all (Namespace
# = "."), which forces ALL queries — not just suffix-matched ones — to that
# profile's nameserver. Used by the `pihole` profile below to pin every
# query to the loopback unbound stub on Windows, overriding any per-adapter
# DNS list a VPN tries to inject (Proton's `10.2.0.1` is the motivating
# case). On Tailscale-only or no-VPN states the catch-all is harmless: 127.0.0.1
# is the existing default resolver anyway (see DNS.md).
vpn_dns_routes:
  # Force every DNS query through the local DoT-forwarding unbound stub
  # (managed by run_onchange_after_56_unbound_windows.ps1.tmpl). Without
  # this, when a VPN like Proton attaches its own DNS to its tunnel adapter,
  # Windows uses the VPN-adapter DNS list for outbound queries and bypasses
  # 127.0.0.1 entirely — silently leaking DNS to the VPN's resolver.
  pihole:
    nameserver: "127.0.0.1"
    domains:
      - ""   # empty -> NRPT catch-all (Namespace = ".")

  pritunl:
    nameserver: "10.25.0.15"
    # Internal-only namespaces. Public DreamHost domains (dreamhost.com,
    # dreamhostps.com, dreamhost.io) are intentionally excluded so they
    # remain reachable when the VPN is down — vpn.dreamhost.io in
    # particular is the VPN login page itself.
    #
    # vk.dreamhost.io is a deeper, internal-only subtree (DH kubecluster /
    # internal infra: *.kubecluster.vk.dreamhost.io, lde-service-master
    # under prod-bm, etc.). NRPT picks the longest-matching suffix, so this
    # entry coexists safely with the unrouted parent .dreamhost.io and does
    # NOT shadow vpn.dreamhost.io (which is at the apex). The pihole
    # catch-all (`.`) above is the shortest possible match, so any of these
    # work-domain rules win over it for matching queries.
    domains:
      - git.dreamhost.com
      - dreamhostnetworks.com
      - dhcompute.net
      - dh-int.com
      - dhdap.com
      - newdream.net
      - dream.io
      - vk.dreamhost.io

# ============================================================================
# Encrypted DNS (DoT) profile
# ============================================================================
# Used by:
#   dot_config/dns/private_pihole-dot.mobileconfig.tmpl   (renders the profile)
#   .chezmoiscripts/run_onchange_after_56_encrypted-dns.sh.tmpl  (installs it)
#
# Encrypts DNS by pinning Apple/Linux clients at the Pi DoT resolver instead
# of UDP/53 to Pi-hole. List both the LAN and tailnet addresses so on-LAN
# clients do not depend on Tailscale for normal Wi-Fi browsing, while the
# same profile still works off-LAN when Tailscale is connected.
#
# Pi-side prerequisite: the host must terminate DoT on :853 with a valid TLS
# cert. See scripts/setup-pihole-dot.sh and the "Encrypted DNS" section of
# RASPI.md. The macOS install script will TCP-probe :853 first and skip with
# a warning if unreachable, so it is safe to enable this before the Pi side
# is ready.
#
# Identifier and UUIDs are intentionally stable so re-applying chezmoi does
# not produce a new profile each run. Regenerate via `uuidgen` if you ever
# need to fully reset.
encrypted_dns:
  enabled: true
  protocol: tls                            # "tls" (DoT) or "https" (DoH)
  server_name: "raspi.alai-altair.ts.net"
  server_addresses:
    - "192.168.0.26"                       # raspi Ethernet LAN IPv4
    - "100.100.149.88"                     # raspi tailnet IPv4
  port: 853                                # used for the reachability probe
  identifier: "com.ranmil.dns.pihole-dot"
  display_name: "Pi-hole DoT"
  organization: "ranmil"
  payload_uuid: "6F4D2A1E-3B8C-4D7F-9E5A-1C2B3D4E5F6A"
  dns_payload_uuid: "7A5E3B2F-4C9D-5E8A-AF6B-2D3C4E5F6A7B"
  # When non-empty, the resolver is only used for DNS queries matching one
  # of these suffixes (split-DNS via DoT). Leave empty to make the resolver
  # the system default.
  match_domains: []

# ============================================================================
# Browser DoH disable
# ============================================================================
# Used by .chezmoiscripts/run_onchange_after_57_browser-doh-policies.sh.tmpl
#
# Forces Firefox/Chrome/Edge/Brave to use the system resolver instead of
# their own DoH endpoint. Without this, Pi-hole filtering is silently
# bypassed by browsers that ship DoH on by default (notably Firefox).
browser_doh:
  enabled: true
  # Each browser writes a managed-policy file owned by root.
  browsers:
    - firefox
    - chrome
    - edge
    - brave

# ============================================================================
# Caddy local-CA trust
# ============================================================================
# Used by .chezmoiscripts/run_onchange_after_58_caddy-ca.{sh,ps1}.tmpl
#
# Caddy in pi-stack uses `tls internal` and issues certs from a self-signed
# root CA stored inside the caddy container at
#   /data/caddy/pki/authorities/local/root.crt
# Without trusting this root, every https://*.raspi URL throws TLS warnings.
# The installer scripts pull the cert via SSH (no host-side bind-mount perms
# required) and import it into the platform trust store:
#   - Windows: certutil -addstore ROOT
#   - macOS:   security add-trusted-cert -k /Library/Keychains/System.keychain
#   - Linux:   /usr/local/share/ca-certificates + update-ca-certificates,
#              or /etc/pki/ca-trust/source/anchors + update-ca-trust,
#              or /etc/ca-certificates/trust-source/anchors + trust extract-compat
# Re-running is idempotent on every platform.
caddy_ca:
  enabled: true
  # SSH alias / hostname of the box running pi-stack's caddy service. Must be
  # reachable via the user's regular ssh config (1Password agent on Windows,
  # ~/.ssh on Unix).
  ssh_host: "raspi"
  # Command run on $ssh_host whose stdout is the PEM-encoded root cert. Going
  # through `docker exec` avoids host-side permissions on the bind-mounted
  # caddy data dir.
  remote_cert_cmd: "docker exec caddy cat /data/caddy/pki/authorities/local/root.crt"
  # Substring used by verification checks to confirm the cert landed in the
  # store (subject CN of Caddy's self-signed root).
  cert_label: "Caddy Local Authority"
  # Filename used in platform trust stores (must end in .crt on Debian).
  store_filename: "caddy-homelab-root.crt"

# vim: ts=2 sts=2 sw=2 et
