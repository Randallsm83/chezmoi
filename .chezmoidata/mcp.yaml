# =============================================================================
# MCP server inventory — single source of truth.
# =============================================================================
#
# Every MCP-capable tool (Claude Code, Warp, Zed, opencode, VS Code, ...) should
# render its config from this map. Add or change a server HERE, run
# `chezmoi apply`, and every tool picks it up.
#
# Schema mirrors the on-disk shape used by Claude Code's `~/.claude.json`
# `mcpServers` block, because it's the most permissive of the schemas in play
# (stdio + http + headers + env) and trivially translatable to the others.
#
# Secret references use ${VAR_NAME} and are resolved at process launch by the
# `op run --env-file=...` wrapper for that tool (Pattern B in SECRETS.md).
# Tools that DON'T launch through `op run` must do the substitution inside
# their own template using `replace ... .secrets.<key>`. See the per-tool
# renderers for details.
#
# To add a server:
#   1. Append an entry under `mcp.servers`.
#   2. If it needs a secret, add the env var to the appropriate
#      ~/.config/op/<tool>.env file(s) so `op run` injects it.
#   3. `chezmoi apply` — the run_onchange_after_60_claude_mcp script
#      writes the new entry into ~/.claude.json on next launch.
#
# To remove a server: delete its entry here and `chezmoi apply`. The Claude
# merge script reconciles by replacing the whole `mcpServers` block, so
# removals propagate without manual `claude mcp remove` calls.
# =============================================================================

mcp:
  servers:
    mcp-deepwiki:
      type: stdio
      command: cmd
      args: ["/c", "npx", "-y", "mcp-deepwiki"]
      env: {}

    memory:
      type: stdio
      command: cmd
      args: ["/c", "npx", "-y", "@modelcontextprotocol/server-memory"]
      env: {}

    chrome-devtools:
      type: stdio
      command: cmd
      args: ["/c", "npx", "-y", "chrome-devtools-mcp@latest", "--acceptInsecureCerts"]
      env: {}

    qdrant:
      type: stdio
      command: uvx
      args: ["--managed-python", "--python", "3.12", "mcp-server-qdrant"]
      env:
        QDRANT_URL: "${QDRANT_URL}"   # host from .infra.pi_fqdn via ~/.mcp.json (dot_mcp.json.tmpl); runtime env for other consumers
        QDRANT_API_KEY: "${QDRANT_API_KEY}"
        COLLECTION_NAME: "memories"
        EMBEDDING_MODEL: "sentence-transformers/all-MiniLM-L6-v2"
        HF_HUB_OFFLINE: "0"

    vercel:
      type: http
      url: "https://mcp.vercel.com"
      headers:
        Authorization: "Bearer ${VERCEL_TOKEN}"

    neon:
      type: http
      url: "https://mcp.neon.tech/mcp"
      headers:
        Authorization: "Bearer ${NEON_API_KEY}"

    clickup:
      type: stdio
      command: cmd
      args: ["/c", "npx", "-y", "clickup-mcp-server@latest"]
      env:
        # Mapped to dh_clickup_api_key in .chezmoi.toml.tmpl's central
        # [data.secrets] table; injected by op run from claude.env / opencode.env.
        CLICKUP_API_TOKEN: "${DH_CLICKUP_API_KEY}"
        # Workspace team id is a public identifier (it appears in every
        # ClickUp URL), so it lives in the env-file as a literal — not in
        # 1Password — but is still kept out of this YAML so it stays
        # per-user.
        CLICKUP_TEAM_ID: "${CLICKUP_TEAM_ID}"

    # 1Password Environments MCP server (desktop-app auth).
    # Lets agents resolve `op://Vault/Item/field` references via the
    # 1Password desktop app — biometric prompt per session, secrets
    # never written to disk, no service-account token stored anywhere.
    # Package: https://github.com/kefapps/onepassword-mcp-codex
    # Requires: 1Password desktop app beta channel + Settings → Developer
    # → "Connect with 1Password SDKs" enabled.
    # Account name is read from $OP_ACCOUNT (e.g. "my" for my.1password.com)
    # so it stays per-user and out of source control; claude/opencode env files
    # set it on the wrapped process. If unset, the MCP falls back
    # to whichever account `op` currently has signed in.
    "1password":
      type: stdio
      command: cmd
      args:
        - "/c"
        - "npx"
        - "-y"
        - "mcp-1password@beta"
        - "--auth-mode=desktop"
        - "--account=${OP_ACCOUNT}"
      env: {}
