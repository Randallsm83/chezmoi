# .chezmoidata/packages.yaml
# Package feature flags, per-platform package mappings, brew bundle, scoop buckets,
# always-install lists, remote machine package sets, and claude_memory_projects.
# Loaded by chezmoi automatically as part of the .chezmoidata/ directory.
# ============================================================================
# Package Feature Flags
# ============================================================================
# Controls which configuration files are deployed by chezmoi
#
# Usage in templates:
#   {{- if index .package_features "rust" }}
#   # Deploy ~/.config/rust/* configs
#   {{- end }}
#
# Group flags (convenience shortcuts):
#   {{- if .package_features.essentials }}
#   # Enables: git, ssh, 1password, mise, direnv
#   {{- end }}
#
# Override in .chezmoi.local.toml:
#   [data.package_features]
#   rust = false
#   golang = false

package_features:
  # ============================================================================
  # Group Flags (convenience shortcuts)
  # ============================================================================
  essentials: true      # git, ssh, 1password, mise, direnv
  shell_tools: true     # starship, zsh, bat, eza, ripgrep, fd, fzf, zoxide, delta, vivid, wget, thefuck
  languages: true       # All language runtimes (node, python, ruby, go, rust, lua)
  editors: true         # nvim, vscode
  terminals: true       # wezterm, warp, windows_terminal

  # ============================================================================
  # Version Control & Authentication (sane defaults)
  # ============================================================================
  # NOTE: `1password` starts with a digit — not a valid Go template identifier.
  # Always access via `index .package_features "1password"`, never dot notation.
  git: true
  ssh: true
  1password: true

  # ============================================================================
  # Package & Tool Version Management (sane defaults)
  # ============================================================================
  mise: true            # Version manager (replaces asdf/nvm)
  direnv: true          # Per-directory environments
  homebrew: true        # Package manager (Linux/macOS)

  # ============================================================================
  # Terminal Emulators (recommended)
  # ============================================================================
  wezterm: true
  warp: true
  windows_terminal: true

  # ============================================================================
  # Text Editors (recommended)
  # ============================================================================
  nvim: true
  vim: true
  vscode: true
  zed: true

  # ============================================================================
  # Shell Tools (recommended)
  # ============================================================================
  starship: true        # Cross-platform prompt
  zsh: true             # Unix shells only
  powershell: true      # Windows shell
  fzf: true             # Fuzzy finder (Go, not Rust)
  wget: true            # Downloader
  thefuck: true         # Command correction (Python)
  fastfetch: true       # System info display (C++)
  topgrade: true        # Cross-platform system upgrader (Rust)
  rust_alternatives: true # All Rust CLI tools: bat, rg, fd, eza, delta, zoxide, vivid,
                          # uutils-coreutils, tealdeer, navi, sd, dust, procs, hyperfine,
                          # just, tokei, ouch, xh

  # ============================================================================
  # Language Runtimes (optional - enable as needed)
  # ============================================================================
  rust: true
  golang: true
  python: true
  ruby: true
  lua: true
  node: true
  perl: true
  julia: true
  php: false        # Requires many build deps (openssl, re2c, etc), enable manually if needed

  # ============================================================================
  # Development Tools (optional)
  # ============================================================================
  sqlite3: true
  arduino: true
  vagrant: false        # Virtualization

  # ============================================================================
  # Fonts
  # ============================================================================
  nerd_fonts: true       # Nerd Font families (scoop nerd-fonts bucket)

  # ============================================================================
  # AI & ML Tools
  # ============================================================================
  ai_tools: true         # LLM inference and AI coding assistants (ollama, claude-code, opencode)

  # ============================================================================
  # Gaming
  # ============================================================================
  gaming: true           # Gaming platforms, save backup, OSD/monitoring

  # ============================================================================
  # Container Tools
  # ============================================================================
  docker: true           # Container orchestration

  # ============================================================================
  # Hardware & Drivers (Windows-only)
  # ============================================================================
  hardware_tools: true   # Hardware diagnostics, GPU tools, driver management

  # ============================================================================
  # Windows System Utilities
  # ============================================================================
  windows_utilities: true  # Search, launcher, cleanup, bootable USB
  sysinternals: true       # Microsoft Sysinternals suite

  # ============================================================================
  # Networking
  # ============================================================================
  network_tools: true    # DNS, cloud storage sync, network diagnostics

  # ============================================================================
  # Miscellaneous Development
  # ============================================================================
  dev_extras: true       # Document conversion, .NET tools, API testing, WordPress

  # ============================================================================
  # Productivity Apps
  # ============================================================================
  productivity: true     # PowerToys, Obsidian, Notepad++, WizTree, AutoHotkey, OFGB

  # ============================================================================
  # Password Managers
  # ============================================================================
  # `1password` keeps its own dedicated flag (handles AgileBits.1Password + cli).
  # This flag covers any *additional* password managers (e.g. bitwarden-cli).
  password_managers: true

  # ============================================================================
  # Browsers
  # ============================================================================
  browsers: true         # Chrome, LibreWolf, Edge, Chromium (scoop)

  # ============================================================================
  # Media & Communications
  # ============================================================================
  media: true            # Spotify, Slack

  # ============================================================================
  # VPN Clients
  # ============================================================================
  vpn: true              # Tailscale, ProtonVPN, Pritunl

  # ============================================================================
  # Legacy/Deprecated (disabled)
  # ============================================================================
  asdf: false           # DEPRECATED: Replaced by mise
  nvm: false            # DEPRECATED: Replaced by mise
  tinted_theming: false # DEPRECATED: Replaced by unified theme system

# ============================================================================
# Package Mapping
# ============================================================================
# Maps feature flags to actual packages per platform/manager
# This allows feature flags to control BOTH config deployment AND package installation
#
# Package manager priority on Unix:
#   1. mise - If available via mise, use it
#   2. brew - Only for tools not in mise (zsh, thefuck) and GUI apps
#   3. System pkg manager - Only build-essential
#
# Bootstrap order on Unix:
#   1. Build from source (if needed): git, curl → ~/.local/share/
#   2. Install homebrew → ~/.local/share/homebrew (Linux) or /opt/homebrew (macOS)
#   3. brew installs base tools
#   4. mise installs CLI tools and language runtimes

# Package Mapping - Platform-based structure
# Each package specifies installation sources per platform.
#
# Windows: scoop (CLI), winget (GUI/system), mise (runtimes)
# Linux: apt/dnf/pacman (bootstrap only), brew, mise
# Darwin: brew, mise
#
# System package managers (apt/dnf/pacman) are ONLY for bootstrap essentials.
# After bootstrap, brew and mise handle everything - never overlap.

package_mapping:
  # Version Control & Authentication
  git:
    windows:
      scoop: [git, gh, glab, lazygit]
      winget: [Git.Git]
      mise: []
    linux:
      apt: [git]
      dnf: [git]
      pacman: [git]
      paru: []
      brew: [lazygit]
      mise: [github-cli]
    darwin:
      brew: [git, lazygit]
      mise: [github-cli]

  ssh:
    windows:
      scoop: []
      winget: []
      mise: []
    linux:
      apt: [openssh-client]
      dnf: [openssh-clients]
      pacman: [openssh]
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  1password:
    windows:
      scoop: [1password-cli]
      winget: [AgileBits.1Password]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []  # 1password-cli has no brew formula on Linux - use apt/install script
      mise: []
    darwin:
      brew: []
      cask: [1password-cli, 1password]  # Both are casks on macOS
      mise: []

  # Package & Tool Version Management
  mise:
    windows:
      scoop: [mise]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []  # mise installed via curl in bootstrap, not brew
      mise: []
    darwin:
      brew: [mise]
      mise: []

  direnv:
    windows:
      scoop: []
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [direnv]
    darwin:
      brew: []
      mise: [direnv]

  homebrew:
    windows:
      scoop: []
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  # Terminal Emulators (GUI apps - casks are macOS only)
  # NOTE: wezterm-nightly (versions bucket) rather than wezterm (extras),
  # because the last "stable" release is 20240203 (Feb 2024) and predates
  # critical Nerd Font V3 PUA glyph rendering fixes. The maintainers ship
  # nightlies only; "stable" is effectively abandoned.
  wezterm:
    windows:
      scoop: [wezterm-nightly]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []  # wezterm is a cask (macOS only)
      mise: []
    darwin:
      brew: []
      cask: [wezterm]
      mise: []

  warp:
    windows:
      scoop: []
      winget: [Warp.Warp]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []  # warp is a cask (macOS only)
      mise: []
    darwin:
      brew: []
      cask: [warp]
      mise: []

  windows_terminal:
    windows:
      scoop: []
      winget: [Microsoft.WindowsTerminal]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  # Text Editors
  nvim:
    windows:
      scoop: [neovim]
      winget: []
      mise: []
    linux:
      # neovim is handled by mise on Linux (core plugin pulls prebuilt GitHub
      # release tarball — fast, current stable, no compile). Distro apt/dnf/
      # pacman lists intentionally empty to avoid installing the older repo
      # version on top of the mise-managed one.
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [neovim]
    darwin:
      brew: []
      mise: [neovim]

  vim:
    windows:
      scoop: [vim]
      winget: []
      mise: []
    linux:
      # Native distro packages only when sudo is available. mise's vim backend
      # compiles from source (noisy + slow); using the distro binary is
      # faster and identical. Fedora ships full vim in `vim-enhanced`.
      # `mise_remote` is the no-sudo fallback used on remote hosts where
      # apt/dnf/pacman are unavailable (mise installs to ~/.local, no root).
      apt: []
      dnf: []
      pacman: []
      brew: [vim]
      mise: []
      mise_remote: [vim]
    darwin:
      # macOS native pkg manager = brew. Same reasoning as Linux.
      brew: [vim]
      mise: []

  vscode:
    windows:
      scoop: []
      winget: [Microsoft.VisualStudioCode]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []  # visual-studio-code is a cask (macOS only)
      mise: []
    darwin:
      brew: []
      cask: [visual-studio-code]
      mise: []

  zed:
    windows:
      scoop: [zed]
      winget: [ZedIndustries.Zed]  # codified to match installed-via-winget drift (P1)
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: [] # zed installed via official script on Linux
      mise: []
    darwin:
      brew: []
      cask: [zed]
      mise: []

  # Shell Tools
  starship:
    windows:
      scoop: [starship]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [starship]
    darwin:
      brew: []
      mise: [starship]

  zsh:
    windows:
      scoop: []
      winget: []
      mise: []
    linux:
      # zsh is already installed by the base-packages script on every Linux
      # distro (it's required for the login shell switch). Listing here is
      # documentation only.
      apt: [zsh]
      dnf: [zsh]
      pacman: [zsh]
      paru: []
      brew: []
      mise: []
    darwin:
      brew: [zsh]
      mise: []

  powershell:
    windows:
      scoop: [abgox.PSCompletions, PowerShell.PSReadLine]
      winget: [Microsoft.PowerShell]
      mise: []
      pwsh_modules: [Terminal-Icons, AudioDeviceCmdlets, Profiler, PSProfiler, Microsoft.WinGet.Client, Microsoft.WinGet.CommandNotFound]
      psc_completions: [7z, arch, bun, cargo, dirname, docker, env, gh, git, head, mise, node, npm, pip, powershell, psc, pwsh, python, scoop, uv, winget, wsl, yarn, zoxide, df, scoop-checkver]
    linux:
      # PowerShell intentionally NOT installed on Linux. It is a Windows-only
      # shell here; leaving all installers empty so the feature flag (which
      # also covers Windows scoop/winget and macOS noop) is a no-op on Linux.
      apt: []
      dnf: []
      pacman: []
      paru: []
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  fzf:
    windows:
      scoop: [fzf, kelleyma49.PSFzf]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [fzf]
    darwin:
      brew: []
      mise: [fzf]

  wget:
    windows:
      scoop: [wget, curl]
      winget: []
      mise: []
    linux:
      apt: [curl]
      dnf: [curl]
      pacman: [curl]          # curl kept for bootstrap; wget moved to brew
      paru: []
      brew: [wget]
      mise: []
    darwin:
      brew: [wget]
      mise: []

  thefuck:
    windows:
      scoop: []
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      paru: []
      brew: [thefuck]
      mise: []
    darwin:
      brew: [thefuck]
      mise: []

  fastfetch:
    windows:
      scoop: [fastfetch]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      paru: []
      brew: [fastfetch]
      mise: []
    darwin:
      brew: [fastfetch]
      mise: []

  topgrade:
    windows:
      scoop: [topgrade]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: ["cargo:topgrade"]
    darwin:
      brew: [topgrade]
      mise: []

  # Language Runtimes
  rust:
    windows:
      scoop: []
      winget: []
      mise: [rust@stable]
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [rust@stable]
    darwin:
      brew: []
      mise: [rust@stable]

  golang:
    windows:
      scoop: []
      winget: []
      mise: [go@latest]
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [go@latest]
    darwin:
      brew: []
      mise: [go@latest]

  python:
    windows:
      scoop: []
      winget: []
      mise: [python@latest, uv]
      pip: [pipx]  # pipx via pip on Windows (mise aqua backend doesn't support Windows)
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [python@latest, uv, pipx]
    darwin:
      brew: []
      mise: [python@latest, uv, pipx]

  ruby:
    windows:
      scoop: []
      winget: []
      mise: [ruby@latest]
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [ruby@latest]
    darwin:
      brew: []
      mise: [ruby@latest]

  lua:
    windows:
      scoop: [lua, luarocks, luajit, lua-language-server]  # lua51 removed: its env_set (LUA_PATH/LUA_CPATH) breaks NVIDIA App OPS Lua runtime
      winget: []
      mise: []
    linux:
      # ONE source per platform when sudo is available. lua/luajit/luarocks
      # come from the native distro pkg manager (apt/dnf/pacman). mise's
      # lua/luajit backends compile from source and mise has no luarocks
      # backend at all, so there's nothing to gain from listing them in mise
      # on hosts with root.
      # lua-language-server is mise-owned everywhere via aqua's prebuilt
      # GitHub release tarball (same pattern as neovim).
      # `mise_remote` is the no-sudo fallback on remote hosts: lua/luajit
      # via mise (compile to ~/.local, no root). luarocks has no mise
      # backend so it can't be installed at all on a no-sudo remote.
      apt: [lua5.4, luajit, luarocks]
      dnf: [lua, luajit, luarocks]
      pacman: [lua, luajit, luarocks]
      brew: []
      mise: ["aqua:LuaLS/lua-language-server"]
      mise_remote: [lua, luajit]
    darwin:
      # macOS native pkg manager = brew. Same reasoning as Linux.
      brew: [lua, luajit, luarocks]
      mise: ["aqua:LuaLS/lua-language-server"]

  node:
    windows:
      scoop: []
      winget: []
      mise: [node@lts, yarn, bun@latest, deno@latest, "npm:bash-language-server"]
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [node@lts, yarn, bun@latest, deno@latest, "npm:bash-language-server"]
    darwin:
      brew: []
      mise: [node@lts, yarn, bun@latest, deno@latest, "npm:bash-language-server"]

  perl:
    windows:
      scoop: []
      winget: [StrawberryPerl.StrawberryPerl]
      mise: []  # mise perl doesn't work on Windows
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [perl@latest]
    darwin:
      brew: []
      mise: [perl@latest]

  julia:
    windows:
      scoop: [juliaup]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []           # juliaup not in official repos
      paru: [juliaup]      # AUR (Rust binary, fast install)
      brew: []
      mise: []
    darwin:
      brew: [juliaup]
      mise: []

  php:
    windows:
      scoop: []
      winget: []
      mise: [php@latest]
    linux:
      apt: []
      dnf: []
      # re2c is a PHP build dep — mirrors the brew_bundle.formulae_php list
      # below. Previously lived in always_install.pacman which installed it
      # unconditionally even when package_features.php was false.
      pacman: [re2c]
      brew: []
      mise: [php@latest]
    darwin:
      brew: []
      mise: [php@latest]

  # Rust CLI Alternatives
  # Rust CLI Alternatives (all Rust tool replacements, except starship)
  # Also controls config deployment for: vivid, coreutils (05-coreutils.ps1), bat themes, etc.
  rust_alternatives:
    windows:
      # `less` is the pager `bat` shells out to (Scoop suggestion for bat)
      # `rustup` is the Rust toolchain installer (Rust-native); `tree-sitter` is the parser
      # CLI for Rust-heavy editor ecosystems (neovim/zed) — both grouped here per the
      # rust_alternatives convention even though tree-sitter itself is C.
      scoop: [bat, ripgrep, fd, eza, delta, zoxide, vivid, uutils-coreutils, tealdeer, navi, sd, dust, procs, hyperfine, just, tokei, ouch, xh, less, rustup, tree-sitter]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      # Linux/WSL policy: prefer mise for Rust CLI alternatives. Brew is
      # reserved for true fallback cases where mise has no viable backend.
      pacman: []
      paru: []
      brew: []
      mise: [github:sharkdp/bat, bat-extras, github:BurntSushi/ripgrep, github:sharkdp/fd, cargo:eza, github:dandavison/delta, github:ajeetdsouza/zoxide, github:sharkdp/vivid, cargo:coreutils, cargo:tealdeer, cargo:navi, github:chmln/sd, cargo:du-dust, github:dalance/procs, github:sharkdp/hyperfine, github:casey/just, cargo:tokei, cargo:ouch, github:ducaale/xh]
    darwin:
      brew: [tealdeer, coreutils, navi, dust, ouch]
      # NOTE: eza stays on cargo backend — mise's github asset autodetect picks
      # the completions tarball instead of the binary release for eza.
      # NOTE: navi, dust, ouch moved to brew — no macOS arm64 GitHub release assets.
      mise: [github:sharkdp/bat, bat-extras, github:BurntSushi/ripgrep, github:sharkdp/fd, cargo:eza, github:dandavison/delta, github:ajeetdsouza/zoxide, github:sharkdp/vivid, github:chmln/sd, github:dalance/procs, github:sharkdp/hyperfine, github:casey/just, cargo:tokei, github:ducaale/xh]

  # Development Tools
  sqlite3:
    windows:
      scoop: [sqlite]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: [sqlite]
    darwin:
      brew: []
      mise: [sqlite]

  arduino:
    windows:
      scoop: [arduino, arduino-cli]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []                 # arduino-cli removed; was unused on this host
      paru: []                   # uncomment [arduino-cli] to reinstall from AUR
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  vagrant:
    windows:
      scoop: []
      winget: []
      mise: []
    linux:
      apt: [vagrant]
      dnf: [vagrant]
      pacman: []                 # vagrant has multiple providers in AUR;
      paru: [vagrant-bin]        # use -bin to dodge paru's interactive provider prompt
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  # Fonts (Nerd Font families)
  nerd_fonts:
    windows:
      scoop: [CascadiaCode-NF, FiraCode-NF, Hack-NF, JetBrainsMono-NF]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: []
    darwin:
      brew: []
      cask: [font-fira-code-nerd-font, font-hack-nerd-font, font-jetbrains-mono-nerd-font, font-caskaydia-cove-nerd-font]
      mise: []

  # AI & ML Tools
  ai_tools:
    windows:
      # `ollama-full` is the Scoop-suggested companion that bundles GPU runtime extras.
      # `pam` and `scott` are DH-internal scoop manifests installed via direct URL
      # (https://git.dreamhost.com/dreamhost-public/homebrew-{pam,scott}/-/raw/master/scoop/<name>.json);
      # they have no scoop bucket, so they are emitted into scoop-packages.json.tmpl
      # but the install script must `scoop install <url>` them (see scoop_bucket_overrides).
      scoop: [ollama, ollama-full, claude-code, opencode, pam, scott]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []          # ollama removed; was unused on this host
      paru: []
      brew: [pam]
      mise: [claude, opencode]
    darwin:
      brew: []
      mise: [claude, opencode]

  # Gaming
  gaming:
    windows:
      # `msikombustor` and `furmark` are Scoop suggestions paired with msiafterburner.
      # `vcredist2022` (suggested for rtss) is intentionally omitted — vcredist-aio
      # in `windows_utilities` installs all VC++ redistributables.
      # `blender` codified from installed-not-declared drift (3D modeling / modding pipeline).
      scoop: [steam, ludusavi, rtss, msiafterburner, msikombustor, furmark, blender]
      # Modding tooling (Wabbajack/Vortex/r2modman), GPU OSD overlay (SpecialK),
      # SoftFever's OrcaSlicer (Bambu P1S slicer; grouped with gaming per audit
      # decision — adjacent hobby tooling), and Microsoft.GameInput runtime.
      winget: [WabbajackTools.Wabbajack, NexusMods.Vortex, SoftFever.OrcaSlicer, ebkr.r2modman, SpecialK.SpecialK, Microsoft.GameInput]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []                 # ludusavi removed; gaming feature not used on this host
      paru: []                   # uncomment [ludusavi-bin] to reinstall game-save backup tool
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  # Container Tools
  docker:
    windows:
      scoop: [docker-compose, rancher-cli, rancher-desktop]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      paru: []
      brew: [docker-compose]
      mise: []
    darwin:
      brew: [docker-compose]
      cask: [orbstack]
      mise: []

  # Hardware & Drivers (Windows-only)
  hardware_tools:
    windows:
      # `windowsdesktop-runtime-10.0` was removed: the scoop install failed repeatedly on
      # this host and the runtime is installed transitively by winget apps anyway.
      # `btop` (system monitor — C++, not Rust, so does NOT belong in rust_alternatives),
      # `equalizer-apo-np` + `peace-np` (audio EQ/DSP via Equalizer APO + Peace GUI;
      # `-np` = Nonportable bucket — they install Windows services),
      # `openscad-dev` (CAD for 3D printing) and `raspberry-pi-imager` (Pi homelab imaging)
      # codify installed-not-declared drift.
      scoop: [nvidia-profile-inspector, nvcleanstall, ddu, cpu-z, gpu-z, smartmontools, fancontrol, btop, equalizer-apo-np, peace-np, openscad-dev, raspberry-pi-imager]
      # Audio interface control (Focusrite Scarlett) + PawnIO low-level hardware driver runtime.
      winget: [FocusriteAudioEngineeringLtd.FocusriteControl, namazso.PawnIO]
      mise: []
    linux:
      # hardware_tools is conceptually Windows-only (see section comment
      # above); WSL2 has no direct disk access for SMART queries, and
      # the feature is otherwise GPU/driver tooling that has no Linux
      # equivalents in this set. Linux side intentionally empty.
      apt: []
      dnf: []
      pacman: []
      paru: []
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  # Windows System Utilities
  windows_utilities:
    windows:
      # `everything-cli` is the CLI companion to the Everything search GUI (user rule:
      # Everything replaces Windows Search indexing).
      # `restart-explorer`, `rufus` (bootable USB), `secureuxtheme` (theme patching)
      # codify installed-not-declared drift.
      # `sudo` is the unix-style scoop sudo. NOTE: a long-standing comment in
      # always_install.scoop says it conflicts with `gsudo` — codifying it here
      # because it IS installed on this host (drift). If reinstalls break, drop it
      # and rely on gsudo exclusively.
      scoop: [everything, everything-cli, flow-launcher, bulk-crap-uninstaller, ventoy, vcredist-aio, islc, restart-explorer, rufus, secureuxtheme, sudo]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  # Sysinternals
  sysinternals:
    windows:
      scoop: [sysinternals-suite, ctrl2cap, whois]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  # Networking
  network_tools:
    windows:
      # unbound: local DoT-forwarding stub resolver (1.25.0). Configured by
      #   .chezmoiscripts/run_onchange_after_56_unbound_windows.ps1.tmpl
      #   to listen on 127.0.0.1:53 and forward via DoT to raspi (primary)
      #   or Cloudflare/Quad9 (fallback). Installs a Windows service.
      # cacert: required by unbound's tls-cert-bundle setting (it's already
      #   in always_install.scoop, listed here for documentation only).
      # nmap: codified from installed-not-declared drift (network probing).
      # NOTE: `pritunl-client` moved to the new `vpn` feature (winget: Pritunl.PritunlClient).
      # The scoop install failed repeatedly; winget ships the official Pritunl MSI.
      scoop: [bind, rclone, unbound, nmap]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      paru: []
      brew: [rclone]
      mise: []
    darwin:
      brew: []
      # VPN client (macOS-only cask).
      cask: [pritunl]
      mise: []

  # Miscellaneous Development
  dev_extras:
    windows:
      # `windowsdesktop-runtime-8.0` (ilspy) and `latex` (pandoc PDF output) are
      # Scoop-suggested companions for packages already in this feature.
      # `glow` (Go; markdown TUI renderer) codified from installed-not-declared drift —
      # grouped here alongside pandoc/wkhtmltopdf as document-rendering tooling.
      scoop: [postman, ilspy, pandoc, wkhtmltopdf, cygwin, dd, wp-cli, windowsdesktop-runtime-8.0, latex, glow]
      # Dev runtimes/SDKs/build toolchains codified from installed-not-declared drift:
      # WSL, usbipd-win (USB-over-IP for WSL), WinDbg (kernel debugger), VS Build Tools 2022,
      # Windows SDK 10.0.26100, JDK 24 + JRE.
      # NOTE: ZedIndustries.Zed is owned by the `zed` feature mapping above.
      winget: [Microsoft.WSL, dorssel.usbipd-win, Microsoft.WinDbg, Microsoft.VisualStudio.2022.BuildTools, Microsoft.WindowsSDK.10.0.26100, Oracle.JDK.24, Oracle.JavaRuntimeEnvironment]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []             # pandoc moved off pacman; brew renders cleanly
      paru: []
      brew: [pandoc]
      mise: []
    darwin:
      brew: []
      mise: []

  # Productivity Apps (Windows GUI utilities)
  productivity:
    windows:
      # `autohotkey` is the scoop-installed counterpart of winget AutoHotkey.AutoHotkey.
      # Both were installed via drift; codified here on scoop ONLY to avoid double-install.
      # See MR Risk section for the explicit decision rationale.
      scoop: [autohotkey]
      # PowerToys (Microsoft utility suite), Obsidian (notes — pairs with $NOTES under
      # ~/projects/notes), Notepad++, WizTree (disk usage), OFGB ("Oh Frick Go Back" —
      # removes Win11 ads). NOTE: AutoHotkey deliberately NOT listed here (scoop owns it).
      winget: [Microsoft.PowerToys, Obsidian.Obsidian, Notepad++.Notepad++, AntibodySoftware.WizTree, xM4ddy.OFGB]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      paru: []
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  # Password Managers (additional to 1Password, which has its own dedicated mapping)
  password_managers:
    windows:
      scoop: [bitwarden-cli]
      winget: []
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      paru: []
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  # Browsers
  browsers:
    windows:
      # `chromium` is the upstream open-source build (scoop extras). Chrome/LibreWolf/Edge
      # ship via winget. Edge is preinstalled on Windows but listing it here makes the
      # winget-export reproducible.
      scoop: [chromium]
      winget: [Google.Chrome, LibreWolf.LibreWolf, Microsoft.Edge]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      paru: []
      brew: []
      mise: []
    darwin:
      brew: []
      mise: []

  # Media & Communications
  media:
    windows:
      scoop: []
      winget: [Spotify.Spotify, SlackTechnologies.Slack]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      paru: []
      brew: []
      mise: []
    darwin:
      # spotify + slack already shipped as casks under brew_bundle.casks_darwin_apps;
      # left empty here to avoid double-install on macOS.
      brew: []
      mise: []

  # VPN Clients
  vpn:
    windows:
      scoop: []
      # Tailscale (mesh VPN), Proton VPN, Pritunl client.
      # Pritunl moved here from network_tools.windows.scoop — the scoop manifest
      # install fails on this host; winget ships the official MSI.
      winget: [Tailscale.Tailscale, Proton.ProtonVPN, Pritunl.PritunlClient]
      mise: []
    linux:
      apt: []
      dnf: []
      pacman: []
      paru: []
      brew: []
      mise: []
    darwin:
      # macOS Pritunl + Tailscale already shipped via existing macOS-only mappings
      # (network_tools.darwin.cask = [pritunl]; Tailscale is typically a system extension).
      brew: []
      mise: []

# ============================================================================
# Brew Bundle (source of truth for Brewfile.tmpl)
# ============================================================================
# Everything in dot_config/homebrew/Brewfile.tmpl is rendered from this
# section plus `always_install.brew` and `package_mapping.<feat>.<os>.brew/cask`.
# Do NOT add hardcoded `brew "..."` or `cask "..."` lines to Brewfile.tmpl.
#
# Guards applied by the template:
# - *_darwin / *_linux keys are OS-scoped
# - formulae_build_deps*, formulae_toolchain*, formulae_standalone are
#   skipped when .is_remote is true
# - formulae_php is gated on package_features.php
# - casks_darwin_*, mas_darwin, taps_darwin apply only on darwin

brew_bundle:
  # --------------------------------------------------------------------------
  # Taps
  # --------------------------------------------------------------------------
  taps_darwin:
    - { name: "buo/cask-upgrade" }
    - { name: "dreamhost/homebrew", url: "git@git.dreamhost.com:dreamhost/homebrew-repo.git" }
  taps_linux:
    - { name: "dreamhost-public/pam", url: "git@git.dreamhost.com:dreamhost-public/homebrew-pam.git" }

  # --------------------------------------------------------------------------
  # Always-installed formulae (no feature flag, all hosts)
  # --------------------------------------------------------------------------
  formulae_darwin:
    - curl
    - mas
    - fontconfig

  # GNU replacements for BSD tools (darwin only; Linux has these natively)
  formulae_gnu_darwin:
    - findutils
    - diffutils
    - binutils
    - bash
    - bison
    - flex
    - gawk
    - gpatch
    - grep
    - gzip
    - gnu-getopt
    - gnu-indent
    - gnu-sed
    - gnu-tar
    - gnu-which
    - m4
    - make
    - file-formula
    - openssh
    - rsync
    - unzip
    - watch

  # --------------------------------------------------------------------------
  # Local-only formulae (skipped on remote hosts)
  # --------------------------------------------------------------------------
  # Build deps for mise runtimes
  formulae_build_deps:
    - openssl
    - readline
    - libyaml
    - ncurses
    - xz
    - libxml2
    - ca-certificates
  # NOTE: formulae_build_deps_linux and formulae_toolchain_linux are reserved
  # for future use. The Linux Brewfile currently renders only always_install.brew
  # plus feature-gated package_mapping.<feature>.linux.brew entries. System
  # build deps live in pacman/apt/dnf to keep `brew bundle` fast on Linux
  # (bottles available for the small set we currently install). To enable these
  # lists, extend dot_config/homebrew/Brewfile.tmpl.
  formulae_build_deps_linux:
    - zlib
  # Installed with args: ["HEAD"]
  formulae_build_deps_head:
    - utf8proc

  # PHP build deps (only when package_features.php is true)
  formulae_php:
    - re2c
    - gd
    - libzip
    - krb5

  # Build toolchain
  formulae_toolchain:
    - automake
    - autogen
    - autoconf
    - cmake
    - libtool
    - pkgconf
    - glib
  formulae_toolchain_darwin:
    - gcc
    - libiconv
  formulae_toolchain_linux:
    - util-linux

  # Standalone workstation tools
  formulae_standalone:
    - gnupg
    - tree
    - universal-ctags
    - perltidy
    - repomix
    - xdg-ninja

  # Tap-specific darwin formulae installed with args: ["HEAD"]
  # (requires the matching entry in taps_darwin)
  formulae_tap_head_darwin:
    - dreamhost/homebrew/lde

  # --------------------------------------------------------------------------
  # Casks (darwin only)
  # --------------------------------------------------------------------------
  casks_darwin_fonts:
    - font-fira-code
    - font-hack
    - font-new-york
    - font-sf-mono
    - font-sf-pro
    - font-symbols-only-nerd-font

  casks_darwin_apps:
    - dropbox
    - flycut
    - homerow
    - firefox@developer-edition
    - postman
    - rectangle
    - slack
    - spotify

  # --------------------------------------------------------------------------
  # Mac App Store
  # --------------------------------------------------------------------------
  mas_darwin:
    - { name: "1Password", id: 1569813296 }

# ============================================================================
# Scoop Buckets
# ============================================================================
# Bucket name → repository URL mapping
# Used by: install script (bucket setup), scoop export template
# Default bucket (main) is always available and not listed here

scoop_buckets:
  extras: "https://github.com/ScoopInstaller/Extras"
  versions: "https://github.com/ScoopInstaller/Versions"
  nerd-fonts: "https://github.com/matthewjberger/scoop-nerd-fonts"
  sysinternals: "https://github.com/niheaven/scoop-sysinternals"
  nonportable: "https://github.com/ScoopInstaller/Nonportable"
  games: "https://github.com/Calinou/scoop-games"
  abyss: "https://github.com/abgox/abyss"

# Apps that live outside the 'main' bucket.
# Only non-main apps need to be listed here; everything else defaults to main.
# Used by scoop-export.json.tmpl to generate a valid scoop import file.
scoop_bucket_overrides:
  extras:
    - arduino
    - autohotkey
    - blender
    - bulk-crap-uninstaller
    - chromium
    - cpu-z
    - ddu
    - everything
    - fancontrol
    - flow-launcher
    - furmark
    - gpu-z
    - ilspy
    - islc
    - lazygit
    - ludusavi
    - msiafterburner
    - msikombustor
    - nvcleanstall
    - nvidia-profile-inspector
    - ollama-full
    - postman
    - raspberry-pi-imager
    - rancher-desktop
    - restart-explorer
    - rtss
    - rufus
    - secureuxtheme
    - vcredist-aio
    - ventoy
    - zed
  versions:
    - openscad-dev
    - steam
    - windowsdesktop-runtime-8.0
    # windowsdesktop-runtime-10.0 removed: scoop install fails repeatedly; the
    # .NET 10 runtime is installed transitively by other winget apps.
  nonportable:
    # Scoop "Nonportable" bucket — apps that install Windows services or system
    # state (cannot be cleanly uninstalled by removing the scoop dir).
    - equalizer-apo-np   # Equalizer APO (audio DSP service)
    - peace-np           # Peace GUI for Equalizer APO
  nerd-fonts:
    - CascadiaCode-NF
    - FiraCode-NF
    - Hack-NF
    - JetBrainsMono-NF
  sysinternals:
    - sysinternals-suite
    - ctrl2cap
    - whois
  abyss:
    - abgox.PSCompletions
    - kelleyma49.PSFzf
    - PowerShell.PSReadLine

# Always-installed packages (not controlled by feature flags)
always_install:
  scoop:
    # IMPORTANT: order matters — aria2 must be installed FIRST so all
    # subsequent scoop downloads benefit from multi-connection downloads.
    - aria2
    - cacert        # CA cert bundle (needed by aria2 over HTTPS)
    - 7zip          # extractor used by many later installers
    - innounp
    - dark
    - chezmoi
    - gsudo
    - scoop-search
    - jq
    - jid           # Interactive JSON drill-down (Scoop suggestion paired with jq)
    - yq
    - make
    - unzip
    - gzip
    - zls           # Zig LSP — pairs with `zig` in always_install.mise (CC/CXX toolchain)
    - taplo         # TOML LSP/formatter — used by opencode lsp + chezmoi/Cargo configs
    - npiperelay    # Bridges the 1Password SSH agent named-pipe from Windows into WSL via socat
    # NOTE: `sudo` (scoop) conflicts with `gsudo` — only `gsudo` is kept.

  winget: []

  brew:
    - jq
    - less
    - yq
    # General-purpose tools not tied to any feature flag; moved from pacman as
    # part of the Linux Homebrew migration (were previously manual installs).
    - cmake
    - htop
    - tree
    # lazygit, wget, tealdeer are owned by their respective feature mappings
    # (git, wget, rust_alternatives). Removing here avoids double `brew "..."`
    # lines in the rendered Brewfile.

  pacman:
    # re2c moved to package_mapping.php.linux.pacman (gated on package_features.php).
    - socat         # WSL→Windows 1Password SSH agent bridge endpoint
    # jq + less previously lived in always_install.brew (cross-platform).
    # On Linux they now come from pacman directly (brew dropped on Linux).
    - jq
    - less

  paru:
    # AUR packages installed via paru. paru is bootstrapped by the
    # install_aur_helper function in run_onchange_before_install_base_packages_unix.sh.tmpl.
    - yq            # YAML processor (AUR; pacman has go-yq which conflicts; stick with AUR yq)

  apt: []
  dnf: []

  mise:
    - aqua:jdx/usage
    - zig
    - aqua:zigtools/zls
    - aqua:tamasfe/taplo
    - npm:perlnavigator-server

  mise_unix:
    - cargo-binstall
    - chezmoi

# Remote machine package sets
# When is_remote=true and remote_minimal=true, only install essential tools
remote_packages:
  # Minimal set for remote servers (no sudo required)
  minimal:
    runtimes:
      - node     # JavaScript runtime
      - python   # Python runtime
      - go       # Go runtime
    tools:
      - direnv   # Per-directory environment
      - fzf      # Fuzzy finder
      - ripgrep  # Fast grep
      - fd       # Fast find
      - bat      # Cat with syntax highlighting
      - delta    # Git diff viewer
      - neovim   # Text editor

  # Full set for remote workstations (with sudo)
  full:
    runtimes:
      - node
      - python
      - ruby
      - go
      - rust
    tools:
      - direnv
      - fzf
      - ripgrep
      - fd
      - bat
      - eza
      - delta
      - starship
      - zoxide
      - neovim
      - sqlite

# ============================================================================
# Claude Code Memory Projects
# ============================================================================
# Maps human-readable project names to relative paths from $HOME.
# Used by run_after script to create symlinks from Claude Code's
# platform-encoded project paths to chezmoi-managed memory directories.
#
# Claude Code encodes paths like: C:\Users\randa\projects → C--Users-randa-projects
# The encoding differs per OS, so we compute it at apply time.
claude_memory_projects:
  chezmoi: "projects/chezmoi"
  projects: "projects"
